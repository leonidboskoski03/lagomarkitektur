<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Blueprint Unfold — Lagom Arkitektur</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      margin: 0;
      background: #f4f1ea;
      font-family: Satoshi, Geist, "Helvetica Neue", Arial, sans-serif;
    }

    #root {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #f4f1ea;
    }

    .clip {
      position: absolute;
      inset: 0;
    }

    /* --- scene layout --- */
    .scene {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1600px;
      perspective-origin: 50% 50%;
    }

    /* --- ambient background decor --- */
    .ambient-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .ambient-line {
      position: absolute;
      background: rgba(43,42,39,0.04);
      height: 1px;
      width: 100%;
    }
    .ambient-line:nth-child(1) { top: 15%; }
    .ambient-line:nth-child(2) { top: 42%; }
    .ambient-line:nth-child(3) { top: 58%; }
    .ambient-line:nth-child(4) { top: 75%; }

    .ambient-vert {
      position: absolute;
      background: rgba(43,42,39,0.03);
      width: 1px;
      height: 100%;
    }
    .ambient-vert:nth-child(5) { left: 20%; }
    .ambient-vert:nth-child(6) { left: 55%; }
    .ambient-vert:nth-child(7) { left: 78%; }

    /* --- blueprint paper --- */
    .blueprint {
      position: relative;
      width: 1400px;
      height: 900px;
      perspective: 1400px;
      perspective-origin: 50% 50%;
      transform-style: preserve-3d;
      box-shadow:
        0 2px 4px rgba(43,42,39,0.06),
        0 8px 24px rgba(43,42,39,0.08),
        0 32px 64px rgba(43,42,39,0.04);
      border-radius: 2px;
    }

    /* 3D panel container — only this establishes the 3D context */
    .panels-3d {
      position: absolute;
      inset: 0;
      display: flex;
      transform-style: preserve-3d;
    }

    .panel {
      flex: 1;
      position: relative;
      height: 100%;
      background:
        linear-gradient(135deg, #faf8f4 0%, #f5f2ec 40%, #f0ece4 100%);
      overflow: hidden;
      will-change: transform;
    }

    /* subtle grid pattern on each panel */
    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background-size: 24px 24px;
      background-image:
        linear-gradient(to right, rgba(43,42,39,0.035) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(43,42,39,0.035) 1px, transparent 1px);
      pointer-events: none;
    }

    /* very subtle vellum texture */
    .panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(255,255,255,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 60%, rgba(200,195,185,0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .panel-left {
      transform-origin: 100% 50%;
      transform: rotateY(0deg);
    }

    .panel-center {
      transform: rotateY(0deg);
    }

    .panel-right {
      transform-origin: 0% 50%;
      transform: rotateY(0deg);
    }

    /* --- crease lines --- */
    .crease {
      position: absolute;
      top: 0;
      width: 3px;
      height: 100%;
      z-index: 5;
      pointer-events: none;
    }

    .crease-left {
      left: calc(100% / 3 - 1.5px);
    }

    .crease-right {
      left: calc(100% * 2 / 3 - 1.5px);
    }

    .crease-line {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(43,42,39,0.12) 30%,
        rgba(43,42,39,0.15) 50%,
        rgba(43,42,39,0.08) 70%,
        transparent 100%
      );
    }

    /* shadow beneath the raised panel edges (folded state) */
    .fold-shadow {
      position: absolute;
      top: 20px;
      bottom: 20px;
      width: 60px;
      pointer-events: none;
      opacity: 0;
    }
    .fold-shadow-left {
      left: -40px;
      background: linear-gradient(to left, rgba(43,42,39,0.12), transparent);
    }
    .fold-shadow-right {
      right: -40px;
      background: linear-gradient(to right, rgba(43,42,39,0.12), transparent);
    }

    /* --- ARCHITECTURAL DRAWING --- */

    /* shared drawing elements (absolutely positioned within each panel) */
    .drawing {
      position: absolute;
      inset: 60px;
      pointer-events: none;
    }

    .drawing-left { right: 0; left: 40px; }
    .drawing-center { left: 0; right: 0; }
    .drawing-right { left: 0; right: 40px; }

    /* Outer wall — continuous line across panels */
    .wall-outer {
      position: absolute;
      border: 1.5px solid rgba(43,42,39,0.5);
    }

    .wall-top {
      top: 18%;
      left: 0;
      right: 0;
      height: 0;
      border-bottom: none;
    }
    .wall-bottom {
      bottom: 25%;
      left: 0;
      right: 0;
      height: 0;
      border-top: none;
    }
    .wall-left {
      left: 0;
      top: 18%;
      bottom: 25%;
      width: 0;
      border-right: none;
    }
    .wall-right {
      right: 0;
      top: 18%;
      bottom: 25%;
      width: 0;
      border-left: none;
    }

    /* interior partition wall */
    .wall-inner {
      position: absolute;
      border-left: 1px solid rgba(43,42,39,0.35);
      height: 30%;
      top: 18%;
      left: 58%;
    }

    /* door opening — gap in the inner wall */
    .door-gap {
      position: absolute;
      left: 58%;
      top: 30%;
      width: 0;
      height: 18%;
      border-left: none;
    }
    .door-gap-fill {
      position: absolute;
      left: calc(58% - 1px);
      top: 30%;
      width: 3px;
      height: 18%;
      background: linear-gradient(135deg, #faf8f4 0%, #f5f2ec 100%);
      z-index: 1;
    }

    /* door swing arc */
    .door-arc {
      position: absolute;
      left: 58%;
      top: 30%;
      width: 60px;
      height: 60px;
      border: 1px solid rgba(43,42,39,0.25);
      border-radius: 0 0 60px 0;
      border-top: none;
      border-left: none;
      transform: translate(0, 0);
    }

    /* window marks on outer wall */
    .window-mark {
      position: absolute;
      height: 12px;
      width: 48px;
      border: 1px solid rgba(43,42,39,0.35);
      border-bottom: none;
      background: repeating-linear-gradient(
        90deg,
        rgba(43,42,39,0.2) 0px,
        rgba(43,42,39,0.2) 4px,
        transparent 4px,
        transparent 8px
      );
    }
    .window-mark-1 {
      top: calc(18% - 12px);
      left: 22%;
    }
    .window-mark-2 {
      top: calc(18% - 12px);
      left: 62%;
    }

    /* --- dimension lines --- */
    .dim {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .dim-line {
      height: 0;
      border-top: 1px solid rgba(43,42,39,0.2);
      flex: 1;
      position: relative;
    }
    .dim-line::before,
    .dim-line::after {
      content: "";
      position: absolute;
      top: -3px;
      width: 1px;
      height: 7px;
      background: rgba(43,42,39,0.3);
    }
    .dim-line::before { left: 0; }
    .dim-line::after { right: 0; }

    .dim-label {
      font-size: 10px;
      letter-spacing: 0.08em;
      color: rgba(43,42,39,0.45);
      font-weight: 500;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .dim-horiz {
      flex-direction: row;
      width: 50%;
    }

    .dim-top {
      top: 10%;
      left: 10%;
    }

    .dim-bottom {
      bottom: 18%;
      left: 25%;
      width: 35%;
    }

    /* --- scale bar --- */
    .scale-bar {
      position: absolute;
      bottom: 40px;
      left: 40px;
      display: flex;
      align-items: center;
      gap: 0;
    }
    .scale-segment {
      height: 4px;
      width: 40px;
    }
    .scale-segment:nth-child(odd) {
      background: rgba(43,42,39,0.4);
    }
    .scale-segment:nth-child(even) {
      background: transparent;
      border-top: 1px solid rgba(43,42,39,0.3);
      border-bottom: 1px solid rgba(43,42,39,0.3);
      height: 3px;
    }
    .scale-label {
      font-size: 8px;
      letter-spacing: 0.05em;
      color: rgba(43,42,39,0.35);
      margin-left: 6px;
      text-transform: uppercase;
    }

    /* --- compass / north arrow --- */
    .compass {
      position: absolute;
      bottom: 40px;
      right: 40px;
      width: 40px;
      height: 40px;
    }
    .compass-svg {
      width: 100%;
      height: 100%;
    }

    /* --- title block --- */
    .title-block {
      position: absolute;
      top: 40px;
      right: 40px;
      text-align: right;
    }
    .title-studio {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: rgba(43,42,39,0.5);
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .title-project {
      font-size: 9px;
      letter-spacing: 0.12em;
      color: rgba(43,42,39,0.3);
      text-transform: uppercase;
    }

    /* --- corner mark (registration cross) --- */
    .corner-mark {
      position: absolute;
      width: 16px;
      height: 16px;
      border: 1px solid rgba(43,42,39,0.15);
    }
    .corner-mark-tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
    .corner-mark-tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
    .corner-mark-bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
    .corner-mark-br { bottom: 30px; right: 30px; border-left: none; border-top: none; }

    /* --- content in left panel extension --- */
    .dim-left-ext {
      top: 45%;
      left: 5%;
      width: 60%;
    }

    /* --- content in right panel extension --- */
    .room-label {
      position: absolute;
      font-size: 8px;
      letter-spacing: 0.12em;
      color: rgba(43,42,39,0.25);
      text-transform: uppercase;
    }
    .room-label-living {
      top: 45%;
      left: 22%;
    }
    .room-label-bedroom {
      top: 45%;
      left: 68%;
    }

    /* section cut markers */
    .section-cut {
      position: absolute;
      top: 18%;
      left: 46%;
      display: flex;
      align-items: center;
      gap: 6px;
      transform: translateY(-20px);
    }
    .section-arrow {
      font-size: 10px;
      color: rgba(43,42,39,0.3);
      letter-spacing: 0.1em;
    }
    .section-label {
      font-size: 8px;
      letter-spacing: 0.1em;
      color: rgba(43,42,39,0.25);
    }

    /* --- SVG drawing overlay (Scene 2) --- */
    .drawing-overlay {
      position: absolute;
      inset: 80px 85px 80px 85px;
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .drawing-overlay svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* SVG path defaults: hidden until GSAP draws them */
    .svg-walls path,
    .svg-doors path,
    .svg-windows line,
    .svg-measurements line {
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
    }

    /* --- Scene 5: 3D door panel --- */
    .door-wrapper {
      position: absolute;
      left: 761.5px;
      top: 336.5px;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
      z-index: 10;
      pointer-events: none;
    }

    .door-align {
      position: absolute;
      width: 60px;
      height: 80px;
      transform-style: preserve-3d;
      transform: rotate(-90deg) rotateX(-90deg);
      transform-origin: 0 0;
    }

    .door-swing {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transform: rotateY(0deg);
      transform-origin: 0 50%;
    }

    .door-panel {
      width: 100%;
      height: 100%;
      background: linear-gradient(
        180deg,
        rgba(232,215,180,0.5) 0%,
        rgba(215,190,155,0.35) 100%
      );
      border: 1px solid rgba(255,195,110,0.25);
      border-left: 2px solid rgba(255,195,110,0.4);
      border-radius: 1px;
      box-shadow:
        2px 0 12px rgba(255,180,80,0.12),
        0 0 20px rgba(255,200,120,0.06);
    }

    /* --- Scene 6: warm transition overlay --- */
    .scene6-warm {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at 40% 48%,
        #f5e8cc 0%,
        #f4f1ea 40%,
        #efe9dc 100%
      );
      opacity: 0;
      pointer-events: none;
      z-index: 20;
    }

    /* subtle ambient drift for background decor */
    .ambient-breathing {
      will-change: transform;
    }
  </style>
</head>
<body>
  <div
    id="root"
    data-composition-id="main"
    data-width="1920"
    data-height="1080"
    data-duration="22"
  >
    <!-- CLIP: whole scene -->
    <section class="clip" data-start="0" data-duration="22" data-track-index="1">

      <!-- ambient background deco -->
      <div class="ambient-bg ambient-breathing">
        <div class="ambient-line"></div>
        <div class="ambient-line"></div>
        <div class="ambient-line"></div>
        <div class="ambient-line"></div>
        <div class="ambient-vert"></div>
        <div class="ambient-vert"></div>
        <div class="ambient-vert"></div>
      </div>

      <!-- scene container with 3D perspective -->
      <div class="scene" id="scene">

        <!-- BLUEPRINT PAPER -->
        <div class="blueprint" id="blueprint">

          <!-- fold shadows at paper edges (2D, outside 3D context) -->
          <div class="fold-shadow fold-shadow-left" id="foldShadowLeft"></div>
          <div class="fold-shadow fold-shadow-right" id="foldShadowRight"></div>

          <!-- crease overlays (2D, at panel fold lines) -->
          <div class="crease crease-left" id="creaseLeft">
            <div class="crease-line"></div>
          </div>
          <div class="crease crease-right" id="creaseRight">
            <div class="crease-line"></div>
          </div>

          <!-- corner registration marks -->
          <div class="corner-mark corner-mark-tl"></div>
          <div class="corner-mark corner-mark-tr"></div>
          <div class="corner-mark corner-mark-bl"></div>
          <div class="corner-mark corner-mark-br"></div>

          <!-- title block -->
          <div class="title-block" id="titleBlock">
            <div class="title-studio">Lagom Arkitektur</div>
            <div class="title-project">Bostad · Plan 01</div>
          </div>

          <!-- SVG drawing overlay (Scene 2: drawn floor plan) -->
          <div class="drawing-overlay" id="drawingOverlay">
            <svg viewBox="0 0 1200 750" fill="none">
              <defs>
                <radialGradient id="warmGlowGrad" cx="0.35" cy="0.5" r="0.65">
                  <stop offset="0%" stop-color="rgba(255,205,120,0.55)" />
                  <stop offset="25%" stop-color="rgba(255,180,80,0.3)" />
                  <stop offset="50%" stop-color="rgba(240,150,60,0.12)" />
                  <stop offset="100%" stop-color="rgba(240,150,60,0)" />
                </radialGradient>
                <linearGradient id="lightBeamGrad" x1="0" y1="0" x2="1" y2="0.15">
                  <stop offset="0%" stop-color="rgba(255,210,130,0.35)" />
                  <stop offset="35%" stop-color="rgba(255,180,80,0.12)" />
                  <stop offset="70%" stop-color="rgba(240,160,60,0.04)" />
                  <stop offset="100%" stop-color="rgba(240,160,60,0)" />
                </linearGradient>
                <radialGradient id="doorPulseGrad" cx="0.3" cy="0.5" r="0.6">
                  <stop offset="0%" stop-color="rgba(255,210,130,0.7)" />
                  <stop offset="35%" stop-color="rgba(255,180,80,0.35)" />
                  <stop offset="70%" stop-color="rgba(240,150,50,0.1)" />
                  <stop offset="100%" stop-color="rgba(240,150,50,0)" />
                </radialGradient>
              </defs>
              <!-- WALLS draw first -->
              <g class="svg-walls" stroke="rgba(43,42,39,0.55)" stroke-width="2" stroke-linecap="round">
                <path pathLength="1" d="M 180,120 L 1020,120" />
                <path pathLength="1" d="M 1020,120 L 1020,660" />
                <path pathLength="1" d="M 1020,660 L 180,660" />
                <path pathLength="1" d="M 180,660 L 180,120" />
                <path pathLength="1" d="M 660,120 L 660,260" />
                <path pathLength="1" d="M 660,320 L 660,660" />
                <path pathLength="1" d="M 660,440 L 740,440" />
                <path pathLength="1" d="M 800,440 L 1020,440" />
              </g>
              <!-- DOORS draw second -->
              <g class="svg-doors" stroke="rgba(43,42,39,0.25)" stroke-width="1.2" fill="none" stroke-linecap="round">
                <path pathLength="1" d="M 660,305 A 45,45 0 0,1 705,260" />
                <path pathLength="1" d="M 780,440 A 40,40 0 0,1 740,480" />
              </g>
              <!-- WINDOWS draw third -->
              <g class="svg-windows" stroke="rgba(43,42,39,0.35)" stroke-width="1.2" fill="none">
                <line pathLength="1" x1="180" y1="300" x2="195" y2="300" />
                <line pathLength="1" x1="180" y1="350" x2="195" y2="350" />
                <line pathLength="1" x1="780" y1="120" x2="780" y2="135" />
                <line pathLength="1" x1="870" y1="120" x2="870" y2="135" />
                <line pathLength="1" x1="180" y1="500" x2="195" y2="500" />
                <line pathLength="1" x1="180" y1="550" x2="195" y2="550" />
              </g>
              <!-- MEASUREMENT LINES draw fourth -->
              <g class="svg-measurements" stroke="rgba(43,42,39,0.15)" stroke-width="0.75" fill="none">
                <line pathLength="1" x1="180" y1="88" x2="1020" y2="88" />
                <line pathLength="1" x1="180" y1="82" x2="180" y2="94" />
                <line pathLength="1" x1="1020" y1="82" x2="1020" y2="94" />
                <line pathLength="1" x1="140" y1="120" x2="140" y2="660" />
                <line pathLength="1" x1="134" y1="120" x2="146" y2="120" />
                <line pathLength="1" x1="134" y1="660" x2="146" y2="660" />
              </g>
              <!-- ROOM LABELS fade in last -->
              <g class="svg-labels" fill="rgba(43,42,39,0.25)" font-family="Geist, Helvetica Neue, Arial, sans-serif" font-size="12" letter-spacing="0.1em" opacity="0">
                <text x="350" y="440">Vardagsrum</text>
                <text x="780" y="300">Sovrum</text>
                <text x="830" y="560">Badrum</text>
              </g>
              <!-- DIMENSION TEXT fade in -->
              <g class="svg-dimtext" fill="rgba(43,42,39,0.2)" font-family="Geist, Helvetica Neue, Arial, sans-serif" font-size="9" letter-spacing="0.08em" opacity="0">
                <text x="600" y="82" text-anchor="middle">8400</text>
                <text x="132" y="400" text-anchor="middle" transform="rotate(-90, 132, 400)">5400</text>
              </g>
              <!-- SCENE 5: warm glow + light beam (behind 3D door) -->
              <g class="door-glow-elements">
                <ellipse data-door="glow" cx="680" cy="290" rx="80" ry="70"
                  fill="url(#warmGlowGrad)" opacity="0" />
                <polygon data-door="beam" points="660,290 660,290 660,290 660,290"
                  fill="url(#lightBeamGrad)" opacity="0" />
                <ellipse data-door="pulse" cx="680" cy="290" rx="50" ry="45"
                  fill="url(#doorPulseGrad)" opacity="0" />
              </g>
            </svg>
          </div>

          <!-- SCENE 5: 3D door (CSS 3D panel with rotateY swing) -->
          <div class="door-wrapper" id="doorWrapper">
            <div class="door-align" id="doorAlign">
              <div class="door-swing" id="doorSwing">
                <div class="door-panel" id="doorPanel"></div>
              </div>
            </div>
          </div>

          <!-- 3D panel container -->
          <div class="panels-3d">

            <!-- LEFT PANEL -->
            <div class="panel panel-left" id="panelLeft">
              <div class="drawing drawing-left">
                <div class="wall-outer wall-top" style="right: 0;"></div>
                <div class="wall-outer wall-bottom" style="right: 0;"></div>
                <div class="wall-outer wall-left" style="bottom: 25%;"></div>
                <div class="window-mark window-mark-1"></div>
                <div class="dim dim-horiz dim-left-ext">
                  <span class="dim-label">4800</span>
                  <div class="dim-line"></div>
                </div>
              </div>
            </div>

            <!-- CENTER PANEL -->
            <div class="panel panel-center" id="panelCenter">
              <div class="drawing drawing-center">
                <div class="wall-outer wall-top" style="left: 0; right: 0;"></div>
                <div class="wall-outer wall-bottom" style="left: 0; right: 0;"></div>
                <div class="wall-inner"></div>
                <div class="door-gap-fill"></div>
                <div class="door-arc"></div>
                <div class="window-mark window-mark-2"></div>
                <div class="dim dim-horiz dim-top">
                  <div class="dim-line"></div>
                  <span class="dim-label">7200</span>
                  <div class="dim-line"></div>
                </div>
                <span class="room-label room-label-living">Vardagsrum</span>
                <span class="room-label room-label-bedroom">Sovrum</span>
                <div class="section-cut">
                  <span class="section-arrow">A</span>
                  <div style="width: 40px; height: 0; border-top: 1px solid rgba(43,42,39,0.2);"></div>
                  <span class="section-arrow">A</span>
                  <span class="section-label">Sektion</span>
                </div>
              </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="panel panel-right" id="panelRight">
              <div class="drawing drawing-right">
                <div class="wall-outer wall-top" style="left: 0;"></div>
                <div class="wall-outer wall-bottom" style="left: 0;"></div>
                <div class="wall-outer wall-right" style="top: 18%; bottom: 25%;"></div>
                <div class="dim dim-horiz dim-bottom">
                  <div class="dim-line"></div>
                  <span class="dim-label">3600</span>
                </div>
                <div class="compass">
                  <svg class="compass-svg" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="18" stroke="rgba(43,42,39,0.2)" stroke-width="0.5"/>
                    <circle cx="20" cy="20" r="14" stroke="rgba(43,42,39,0.12)" stroke-width="0.4"/>
                    <line x1="20" y1="4" x2="20" y2="36" stroke="rgba(43,42,39,0.3)" stroke-width="0.6"/>
                    <line x1="4" y1="20" x2="36" y2="20" stroke="rgba(43,42,39,0.15)" stroke-width="0.4"/>
                    <polygon points="20,4 18,14 22,14" fill="rgba(43,42,39,0.4)"/>
                    <polygon points="20,36 18,26 22,26" fill="rgba(43,42,39,0.15)"/>
                    <text x="20" y="3" text-anchor="middle" fill="rgba(43,42,39,0.35)" font-size="5" font-family="inherit">N</text>
                  </svg>
                </div>
                <div class="scale-bar">
                  <div class="scale-segment"></div>
                  <div class="scale-segment"></div>
                  <div class="scale-segment"></div>
                  <div class="scale-segment"></div>
                  <span class="scale-label">0  1  2  5m</span>
                </div>
              </div>
            </div>

          </div><!-- /panels-3d -->

        </div><!-- /blueprint -->

      </div><!-- /scene -->

      <!-- Scene 6: warm background overlay (final transition) -->
      <div class="scene6-warm" id="scene6Warm"></div>

    </section>
  </div>

  <script>
    window.__timelines = window.__timelines || {};
    var tl = gsap.timeline({ paused: true });

    // — Scene 1 elements —
    var panelLeft = document.getElementById("panelLeft");
    var panelRight = document.getElementById("panelRight");
    var foldShadowLeft = document.getElementById("foldShadowLeft");
    var foldShadowRight = document.getElementById("foldShadowRight");
    var titleBlock = document.getElementById("titleBlock");

    // — Scene 2 elements —
    var drawingOverlay = document.getElementById("drawingOverlay");

    // — Scene 1 initial state —
    gsap.set(panelLeft, { rotationY: 68 });
    gsap.set(panelRight, { rotationY: -68 });
    gsap.set(foldShadowLeft, { opacity: 0.8 });
    gsap.set(foldShadowRight, { opacity: 0.8 });
    gsap.set(titleBlock, { opacity: 0, y: -8 });
    gsap.set(drawingOverlay, { opacity: 0 });

    // — Scene 1: unfold —
    tl.to(panelLeft, { rotationY: 0, duration: 1.4, ease: "power3.inOut" }, 0.5)
      .to(panelRight, { rotationY: 0, duration: 1.4, ease: "power3.inOut" }, 0.5)
      .to(foldShadowLeft, { opacity: 0, duration: 1.2, ease: "power2.out" }, 0.5)
      .to(foldShadowRight, { opacity: 0, duration: 1.2, ease: "power2.out" }, 0.5)
      .to(titleBlock, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 1.6);

    // — Scene 2: drawing animation —
    // Fade in the drawing overlay
    tl.to(drawingOverlay, { opacity: 1, duration: 0.4, ease: "power2.out" }, 3.0);

    // Walls draw first (staggered)
    tl.fromTo(".svg-walls path",
      { strokeDashoffset: 1 },
      { strokeDashoffset: 0, duration: 0.8, ease: "power2.out", stagger: 0.06 },
      3.2
    );

    // Doors draw second
    tl.fromTo(".svg-doors path",
      { strokeDashoffset: 1 },
      { strokeDashoffset: 0, duration: 0.5, ease: "power2.out", stagger: 0.15 },
      4.2
    );

    // Windows draw third
    tl.fromTo(".svg-windows line",
      { strokeDashoffset: 1 },
      { strokeDashoffset: 0, duration: 0.3, ease: "power1.out", stagger: 0.06 },
      4.7
    );

    // Measurement lines draw fourth
    tl.fromTo(".svg-measurements line",
      { strokeDashoffset: 1 },
      { strokeDashoffset: 0, duration: 0.5, ease: "power2.out", stagger: 0.04 },
      5.2
    );

    // Labels fade in
    tl.fromTo(".svg-labels",
      { opacity: 0 },
      { opacity: 1, duration: 0.5, ease: "power2.out", stagger: 0.12 },
      6.0
    );

    // Dimension text fade in
    tl.fromTo(".svg-dimtext",
      { opacity: 0 },
      { opacity: 1, duration: 0.4, ease: "power2.out" },
      6.8
    );

    // — Scene 3: isometric camera transition —
    tl.to(".blueprint", {
      rotationX: 28,
      rotationZ: 14,
      scale: 0.78,
      y: -40,
      duration: 2.2,
      ease: "power3.inOut"
    }, 8.0);

    // — Scene 5: door reveal (emotional moment) —
    // Initial state: door invisible
    gsap.set('.door-swing', { opacity: 0, rotationY: 0 });

    // Door panel materializes with warm highlight
    tl.fromTo('.door-swing',
      { opacity: 0 },
      { opacity: 1, duration: 0.6, ease: "power2.out" },
      11.0
    );

    // Warm glow begins expanding (anticipation before door opens)
    tl.fromTo('[data-door="glow"]',
      { opacity: 0, attr: { rx: 15, ry: 13 } },
      { opacity: 0.8, attr: { rx: 110, ry: 90 }, duration: 1.8, ease: "power3.out" },
      11.3
    );

    // Door swings open on Y axis — real 3D CSS rotation
    tl.to('.door-swing', {
      rotationY: -75,
      duration: 1.0,
      ease: "power2.inOut"
    }, 11.5);

    // Light beam spills into the bedroom
    tl.fromTo('[data-door="beam"]',
      { opacity: 0, attr: { points: "660,290 660,290 660,290 660,290" } },
      { opacity: 1, attr: { points: "660,260 660,320 1020,400 1020,180" }, duration: 1.8, ease: "power2.out" },
      12.0
    );

    // Secondary warm pulse bloom (emotional beat)
    tl.fromTo('[data-door="pulse"]',
      { opacity: 0, attr: { rx: 20, ry: 18 } },
      { opacity: 0.55, attr: { rx: 70, ry: 60 }, duration: 1.4, ease: "power2.out" },
      12.6
    ).to('[data-door="pulse"]', {
      opacity: 0.3,
      attr: { rx: 60, ry: 50 },
      duration: 2.5,
      ease: "sine.inOut"
    }, 14.0);

    // — Scene 6: camera push — from blueprint into warm living space —
    // Blueprint zooms in (camera push toward door opening)
    tl.to('.blueprint', {
      scale: 2.6,
      x: -320,
      y: -160,
      duration: 4.5,
      ease: "power3.inOut"
    }, 15.0);

    // Perspective tightens for dramatic push effect
    tl.to('#scene', {
      perspective: 500,
      duration: 3.5,
      ease: "power2.out"
    }, 15.0);

    // Warm glow expands to fill the frame
    tl.to('[data-door="glow"]', {
      attr: { rx: 700, ry: 600 },
      opacity: 1,
      duration: 4.0,
      ease: "power3.out"
    }, 15.0);

    // Secondary pulse bloom expands with the glow
    tl.to('[data-door="pulse"]', {
      attr: { rx: 600, ry: 500 },
      opacity: 0.65,
      duration: 4.0,
      ease: "power3.out"
    }, 15.2);

    // Light beam washes across the entire width
    tl.to('[data-door="beam"]', {
      attr: { points: "660,0 660,750 1200,750 1200,0" },
      opacity: 0.35,
      duration: 3.5,
      ease: "power2.out"
    }, 15.5);

    // Technical drawing elements fade away
    tl.to('.svg-walls path, .svg-doors path, .svg-windows line, .svg-measurements line',
      { opacity: 0, duration: 2.5, ease: "power2.out" }, 15.5);
    tl.to('.svg-labels, .svg-dimtext',
      { opacity: 0, duration: 2.0, ease: "power2.out" }, 16.0);

    // Ambient background lines fade
    tl.to('.ambient-bg', { opacity: 0, duration: 2.5, ease: "power2.out" }, 15.5);

    // Blueprint paper panels dissolve
    tl.to('.panel', { opacity: 0.03, duration: 3.0, ease: "power2.out" }, 16.0);

    // Small decorative marks fade
    tl.to('.crease, .corner-mark, .title-block, .scale-bar, .compass, .room-label, .section-cut',
      { opacity: 0, duration: 1.5, ease: "power2.out" }, 16.5);

    // Door panel itself dissolves into the warm light
    tl.to('.door-swing', { opacity: 0.15, duration: 2.5, ease: "power2.out" }, 17.0);

    // Final warm overlay — clean full-screen background for next section
    tl.to('#scene6Warm', { opacity: 1, duration: 3.0, ease: "power2.out" }, 18.0);

    // — Ambient breathing (runs full length) —
    var ambientEl = document.querySelector(".ambient-breathing");
    if (ambientEl) {
      tl.to(ambientEl, { y: -4, opacity: 0.6, duration: 3.5, ease: "sine.inOut" }, 0)
        .to(ambientEl, { y: 0, opacity: 0.8, duration: 3.5, ease: "sine.inOut" }, 3.5);
    }

    window.__timelines["main"] = tl;
  </script>
</body>
</html>
